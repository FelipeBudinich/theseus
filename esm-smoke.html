<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Impact ESM Smoke Test</title>
  <style>
    body {
      font-family: monospace;
      margin: 2rem;
      background: #111;
      color: #f3f3f3;
    }

    pre {
      padding: 1rem;
      background: #1d1d1d;
      border: 1px solid #333;
      overflow: auto;
    }
  </style>
</head>
<body data-status="pending">
  <h1>Impact ESM Smoke Test</h1>
  <p>This page imports <code>lib/impact/ig.js</code> directly in the browser.</p>
  <pre id="status">Loading…</pre>

  <script type="module">
    import ig from './lib/impact/ig.js';

    const wm = ig.namespace('wm');
    const Example = ig.Class.extend({
      init: function () {
        this.answer = 42;
      }
    });
    const merged = ig.merge({ nested: { keep: true } }, { nested: { add: 'ok' } });
    const results = {
      message: 'ESM bootstrap loaded without ig.module()',
      windowIgMatchesImport: window.ig === ig,
      namespaceBootstrapWorks: wm === window.wm,
      classSystemWorks: new Example().answer === 42,
      objectHelpersWork: merged.nested.keep === true && merged.nested.add === 'ok',
      vendorHelpersPresent: typeof ig.normalizeVendorAttribute === 'function'
    };
    const passed = Object.values(results).every((value) => value === true || typeof value === 'string');

    document.body.dataset.status = passed ? 'ok' : 'failed';
    document.getElementById('status').textContent = JSON.stringify(results, null, 2);
  </script>
</body>
</html>
